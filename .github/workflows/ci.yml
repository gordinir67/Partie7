name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  api:
    name: Vérifier le backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v5

      - name: Préparer Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Rendre Gradle utilisable sous Linux
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew

      - name: Compiler et lancer les tests
        run: ./gradlew clean build --no-daemon

  webapp:
    name: Vérifier le frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v5

      - name: Préparer Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Construire l'application Angular
        run: npm run build

      - name: Exécuter les tests front en mode CI
        run: npm run test:ci

  sonarcloud:
    name: Analyser avec SonarCloud
    runs-on: ubuntu-latest
    needs:
      - api
      - webapp

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Mettre en cache SonarCloud
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Préparer Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Préparer Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Rendre Gradle utilisable sous Linux
        working-directory: back
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew

      - name: Installer les dépendances frontend
        working-directory: front
        run: npm ci

      - name: Générer le coverage backend avec JaCoCo
        working-directory: back
        run: ./gradlew clean test jacocoTestReport --no-daemon

      - name: Générer le coverage frontend
        working-directory: front
        run: npm run test:ci

      - name: Lancer l'analyse SonarCloud
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}