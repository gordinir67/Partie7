name: Validation continue

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  api:
    name: Vérifier le backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v5

      - name: Préparer Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Rendre Gradle utilisable sous Linux
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew

      - name: Compiler et lancer les tests
        run: ./gradlew clean build --no-daemon

  webapp:
    name: Vérifier le frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v5

      - name: Préparer Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Construire l'application Angular
        run: npm run build

      - name: Exécuter les tests front en mode CI
        run: npm run test -- --watch=false --browsers=ChromeHeadless
